<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireMeScore - Sign Up</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Falling Petals Animation Container -->
    <div class="petals-container" id="petalsContainer"></div>
    <div class="container">
        <div class="signup-container">
            <h1>Join HireMeScore</h1>
            <p>Create your account to get started</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="userType">Background</label>
                    <select id="userType" required>
                        <option value="">Select your background</option>
                        <option value="technical">Technical</option>
                        <option value="non-technical">Non-Technical</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="domain">Domain</label>
                    <select id="domain" required>
                        <option value="">Select your background first</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="cgpa">CGPA (out of 10)</label>
                    <input type="number" id="cgpa" min="0" max="10" step="0.01" required>
                </div>
                
                <div class="form-group" id="githubGroup" style="display: none;">
                    <label for="github">GitHub Profile URL</label>
                    <input type="url" id="github" placeholder="https://github.com/username">
                </div>
                
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            
            <p class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <!-- LOAD FIREBASE FIRST - ONLY THESE TWO SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- THEN INITIALIZE FIREBASE -->
    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD7K6AniKSS4CZsO3iGsFJqiaN40IDc4R4",
            authDomain: "hiremescore-b1b05.firebaseapp.com",
            projectId: "hiremescore-b1b05",
            storageBucket: "hiremescore-b1b05.firebasestorage.app",
            messagingSenderId: "460914828014",
            appId: "1:460914828014:web:14715d397ea982136649ff"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        console.log("Firebase initialized");
    </script>
    
    <!-- Petals Animation Script -->
    <script>
        function createPetals() {
            const container = document.getElementById('petalsContainer');
            if (!container) return;
            
            const petalCount = 35; // Slightly more petals for signup page celebration!
            
            for (let i = 0; i < petalCount; i++) {
                setTimeout(() => {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    
                    // Random size between 8px and 22px
                    const size = Math.random() * 14 + 8;
                    petal.style.width = size + 'px';
                    petal.style.height = size + 'px';
                    
                    // Random starting position
                    petal.style.left = Math.random() * 100 + '%';
                    
                    // Random animation duration between 4s and 10s
                    const duration = Math.random() * 6 + 4;
                    petal.style.animationDuration = duration + 's';
                    
                    // Random delay
                    petal.style.animationDelay = Math.random() * 5 + 's';
                    
                    // Random rotation
                    petal.style.transform = `rotate(${Math.random() * 360}deg)`;
                    
                    container.appendChild(petal);
                    
                    // Remove petal after animation to prevent memory leaks
                    setTimeout(() => {
                        if (petal.parentNode) {
                            petal.remove();
                        }
                    }, duration * 1000 + 5000);
                    
                }, i * 150); // Stagger the creation
            }
        }

        // Create petals when page loads
        window.addEventListener('load', function() {
            createPetals();
            // Recreate petals every 12 seconds for continuous effect
            setInterval(createPetals, 12000);
        });

        // Optional: Create extra petals on form focus for interactive fun
        const formInputs = document.querySelectorAll('input, select');
        formInputs.forEach(input => {
            input.addEventListener('focus', () => {
                // Create 3 quick petals on focus
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const petal = document.createElement('div');
                        petal.className = 'petal';
                        const size = Math.random() * 12 + 6;
                        petal.style.width = size + 'px';
                        petal.style.height = size + 'px';
                        petal.style.left = Math.random() * 100 + '%';
                        petal.style.animationDuration = (Math.random() * 3 + 3) + 's';
                        petal.style.animationDelay = '0s';
                        document.getElementById('petalsContainer').appendChild(petal);
                        
                        setTimeout(() => {
                            if (petal.parentNode) {
                                petal.remove();
                            }
                        }, 6000);
                    }, i * 100);
                }
            });
        });
    </script>

    <!-- FINALLY LOAD YOUR CUSTOM SCRIPT -->
    <script src="/js/auth.js"></script>
</body>
</html>
